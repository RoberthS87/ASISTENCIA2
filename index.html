<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS - Sistema de Asistencia HÌbrido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1e293b; font-family: sans-serif; }
        .contenedor-principal { display: flex; height: 100vh; width: 100vw; }
        .area-app { flex: 1; height: 100%; border: none; }
        .area-camara-pc { width: 340px; background: #0f172a; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 2px solid #334155; color: white; }
        video { width: 100%; border-radius: 8px; transform: scaleX(-1); background: black; border: 2px solid #475569; }
        @media (max-width: 768px) {
            .area-camara-pc { display: none !important; } /* Desaparece autom·ticamente en celulares */
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <iframe id="iframe-google" class="area-app" src="https://script.google.com/macros/s/AKfycby1oj3xk1rwFjAW87qsRxCdvAI-2QyVmAxYfkqD5MpUYYaXK-XYfCK1WPb7tDiSwKjF/exec"></iframe>

        <div class="area-camara-pc text-center">
            <h5 class="fw-bold mb-1 text-info">C¡MARA WEB (PC)</h5>
            <p class="text-muted small mb-3">V·lido para marcar en computadoras</p>
            
            <video id="webcam" autoplay playsinline></video>
            
            <button class="btn btn-info w-100 mt-3 p-2 fw-bold text-white shadow" onclick="tomarFotoPC()">
                ?? CAPTURAR ROSTRO
            </button>
            <small class="text-muted mt-3 d-block" style="font-size: 11px;">Al capturar, la foto se inyectar· de inmediato en el formulario de la izquierda.</small>
        </div>
    </div>

    <script>
        let streamWebcam = null;
        const video = document.getElementById('webcam');

        // Solo encender la webcam si el usuario est· en una PC de escritorio o Laptop
        if (window.innerWidth > 768) {
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: false })
                .then(stream => {
                    streamWebcam = stream;
                    video.srcObject = stream;
                })
                .catch(err => {
                    alert("Aseg˙rate de dar permisos a la c·mara en el candado del navegador.");
                });
        }

        function tomarFotoPC() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            
            // Efecto espejo natural
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const base64Img = canvas.toDataURL('image/jpeg');
            
            // Enmascaramos y enviamos la foto de manera segura al iFrame de Google
            const iframe = document.getElementById('iframe-google').contentWindow;
            iframe.postMessage({ tipo: "FOTO_PC", base64: base64Img }, "*");
        }
    </script>
</body>
</html>
